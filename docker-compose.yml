version: '3.8'

# ════════════════════════════════════════════════════════════════════════
# Docker (Colima) on macOS — host connectivity
# ════════════════════════════════════════════════════════════════════════
# Runtime: Colima (Docker Engine 27.x) — started with:
#   colima start --cpu 4 --memory 6 --network-address
#
# host-gateway resolves to the Colima VM's default route (192.168.5.2),
# which is the Mac host. Docker Engine supports the "host-gateway" magic
# alias natively — no hardcoded IPs needed.
#
# IMPORTANT — LM Studio / OMLX must listen on 0.0.0.0, not 127.0.0.1
# ─────────────────────────────────────────────────────────────────────
# Colima's VM cannot reach the Mac's loopback (127.0.0.1).
# In LM Studio: Local Server → Server Options → enable
#   "Serve on Local Network" / "Listen on all interfaces"
# For OMLX:   omlx serve --host 0.0.0.0 --port 8000 --model <model>
# For OLLAMA: OLLAMA_HOST=0.0.0.0 ollama serve
# ════════════════════════════════════════════════════════════════════════

services:
  gym-workout-rag:
    build:
      context: .
      dockerfile: Dockerfile
    image: gym-workout-rag:latest
    container_name: gym-workout-rag
    ports:
      - "127.0.0.1:7500:7500"   # Flask Frontend  — accessible only from localhost
      - "127.0.0.1:7501:7501"   # FastAPI Backend — accessible only from localhost
    volumes:
      # Persist ChromaDB vector store between restarts
      - ./data:/app/data
      # Mount .env read-only so the container picks up your LLM settings
      - ./.env:/app/.env:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=7501
      - FRONTEND_URL=http://localhost:7500
      # Flask → FastAPI: both run inside the same container on loopback
      - FASTAPI_URL=http://localhost:7501
      # ── Reach LM Studio / OMLX / OLLAMA on the Mac host ─────────────────────
      # host.docker.internal resolves to the Mac via the extra_hosts entry below.
      # Change the port to match whichever server you are running:
      #   LM Studio  → http://host.docker.internal:1234/v1
      #   OMLX       → http://host.docker.internal:8000/v1
      #   OLLAMA     → http://host.docker.internal:11434/v1
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_MODEL=${LLM_MODEL:-local-model}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # CORS — allow browser on the Mac to talk to both ports
      - ALLOWED_ORIGINS=http://localhost:7500,http://127.0.0.1:7500
    extra_hosts:
      # Docker Engine (Colima) supports "host-gateway" natively.
      # It resolves to the VM's default route = Mac host IP.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7501/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Optional: run OLLAMA inside Docker (no host binding needed) ───────────
  # docker compose --profile with-ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    profiles:
      - with-ollama

volumes:
  ollama_data:
    driver: local

# Made with Bob
